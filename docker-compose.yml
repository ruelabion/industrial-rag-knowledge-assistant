version: "3.9"

services:
  api:
    build:
      context: ./api/simplified-fastapi-example
    container_name: industrial-rag-demo-api
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      - qdrant

  qdrant:
    image: qdrant/qdrant:latest
    container_name: industrial-rag-demo-qdrant
    ports:
      - "${QDRANT_HTTP_PORT:-6333}:6333"
      - "${QDRANT_GRPC_PORT:-6334}:6334"
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  qdrant_data:
